<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentsBot — Custos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui,-apple-system,sans-serif}
header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{color:#58a6ff;font-size:20px;font-weight:700}
.nav{display:flex;gap:4px}
.nav a{padding:6px 14px;border-radius:6px;font-size:13px;text-decoration:none;color:#8b949e;transition:all .2s}
.nav a:hover,.nav a.active{background:#21262d;color:#c9d1d9}
.main{padding:24px;max-width:1200px;margin:0 auto}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px}
.card-title{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600}
.stat-value{font-size:32px;font-weight:700;color:#fff;line-height:1}
.stat-sub{font-size:12px;color:#8b949e;margin-top:5px}
.stat-green{color:#3fb950}
.stat-yellow{color:#d29922}
.stat-blue{color:#58a6ff}
.section-title{font-size:13px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #21262d}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;color:#8b949e;font-weight:600;text-transform:uppercase;border-bottom:1px solid #21262d}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid #161b22}
tr:hover td{background:#1c2128}
.bar-wrap{background:#21262d;border-radius:4px;height:6px;overflow:hidden;display:inline-block;width:80px;vertical-align:middle;margin-right:6px}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-cloud{background:#f85149}
.bar-local{background:#3fb950}
.badge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-local{background:#3fb95018;color:#3fb950;border:1px solid #3fb95030}
.badge-cloud{background:#f8514918;color:#f85149;border:1px solid #f8514930}
.period-btn{padding:5px 12px;border-radius:6px;font-size:12px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;transition:all .2s}
.period-btn.active,.period-btn:hover{background:#21262d;color:#c9d1d9;border-color:#58a6ff}
.controls{display:flex;gap:8px;margin-bottom:20px;align-items:center}
.controls label{font-size:13px;color:#8b949e}
.empty{color:#484f58;font-size:13px;padding:20px;text-align:center}
.cost-free{color:#3fb950}
.cost-paid{color:#d29922}
</style>
</head>
<body>
<header>
  <h1>AgentsBot — Custos</h1>
  <nav class="nav">
    <a href="/">Live</a>
    <a href="/costs" class="active">Custos</a>
  </nav>
</header>
<div class="main">

  <div class="controls">
    <label>Período:</label>
    <button class="period-btn active" data-days="1" onclick="setPeriod(1,this)">Hoje</button>
    <button class="period-btn" data-days="7" onclick="setPeriod(7,this)">7 dias</button>
    <button class="period-btn" data-days="30" onclick="setPeriod(30,this)">30 dias</button>
  </div>

  <!-- KPIs -->
  <div class="grid3">
    <div class="card">
      <div class="card-title">Custo Total</div>
      <div class="stat-value stat-yellow" id="kTotal">—</div>
      <div class="stat-sub" id="kPeriod">—</div>
    </div>
    <div class="card">
      <div class="card-title">Tokens Usados</div>
      <div class="stat-value stat-blue" id="kTokens">—</div>
      <div class="stat-sub" id="kRuns">— runs</div>
    </div>
    <div class="card">
      <div class="card-title">Poupança (Ollama)</div>
      <div class="stat-value stat-green" id="kSavings">—</div>
      <div class="stat-sub">chamadas locais gratuitas</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px">
    <!-- Por Agente -->
    <div class="card">
      <div class="section-title">Custo por Agente</div>
      <table id="agentTable">
        <thead><tr><th>Agente</th><th>Custo</th><th>Tokens</th><th>Runs</th></tr></thead>
        <tbody><tr><td colspan="4" class="empty">A carregar…</td></tr></tbody>
      </table>
    </div>

    <!-- Por Modelo -->
    <div class="card">
      <div class="section-title">Custo por Modelo</div>
      <table id="modelTable">
        <thead><tr><th>Modelo</th><th>Tipo</th><th>Custo</th><th>Chamadas</th></tr></thead>
        <tbody><tr><td colspan="4" class="empty">A carregar…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Traces recentes -->
  <div class="card">
    <div class="section-title">Execuções Recentes</div>
    <table id="tracesTable">
      <thead>
        <tr>
          <th>Hora</th><th>Agente</th><th>Tarefa</th><th>Modelo</th>
          <th>Tokens</th><th>Custo</th><th>Duração</th><th>Estado</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="8" class="empty">A carregar…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API = 'http://localhost:8080';
let currentDays = 1;

function setPeriod(days, btn) {
  currentDays = days;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadCosts();
}

function fmtCost(c) {
  if (!c || c === 0) return '<span class="cost-free">$0.0000</span>';
  return `<span class="cost-paid">$${Number(c).toFixed(5)}</span>`;
}
function fmtNum(n) { return n != null ? Number(n).toLocaleString('pt') : '—'; }
function fmtMs(ms) {
  if (!ms) return '—';
  if (ms < 1000) return ms + 'ms';
  return (ms/1000).toFixed(1) + 's';
}
function timeStr(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('pt', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function isLocal(model) {
  return ['qwen','llama','mistral','ollama'].some(k => (model||'').toLowerCase().includes(k));
}

async function loadCosts() {
  try {
    const [costs, traces, routing] = await Promise.all([
      fetch(`${API}/costs?days=${currentDays}`).then(r=>r.json()).catch(()=>({})),
      fetch(`${API}/traces?days=${currentDays}&limit=30`).then(r=>r.json()).catch(()=>({})),
      fetch(`${API}/routing`).then(r=>r.json()).catch(()=>({})),
    ]);

    // KPIs
    const total = costs.realtime_cost_usd ?? costs.total_cost_usd ?? 0;
    document.getElementById('kTotal').innerHTML = fmtCost(total);
    const periodLabel = currentDays === 1 ? 'hoje' : `últimos ${currentDays} dias`;
    document.getElementById('kPeriod').textContent = periodLabel;
    document.getElementById('kTokens').textContent = fmtNum(costs.realtime_tokens ?? costs.total_tokens ?? 0);
    document.getElementById('kRuns').textContent = `${fmtNum(costs.total_runs ?? 0)} runs`;
    const pct = routing.pct_local ?? 0;
    document.getElementById('kSavings').textContent = pct + '%';

    // Por agente
    const byAgent = costs.by_agent_realtime ?? costs.by_agent ?? {};
    const agTbody = document.querySelector('#agentTable tbody');
    const agents = Object.entries(byAgent).sort((a,b)=>b[1].cost_usd-a[1].cost_usd);
    agTbody.innerHTML = agents.length
      ? agents.map(([name,v]) => `<tr>
          <td style="font-weight:500">${name}</td>
          <td>${fmtCost(v.cost_usd)}</td>
          <td style="color:#8b949e">${fmtNum(v.tokens)}</td>
          <td style="color:#8b949e">${v.runs ?? '—'}</td>
        </tr>`).join('')
      : `<tr><td colspan="4" class="empty">Sem dados</td></tr>`;

    // Por modelo
    const byModel = costs.by_model_realtime ?? costs.by_model ?? {};
    const mdTbody = document.querySelector('#modelTable tbody');
    const models = Object.entries(byModel).sort((a,b)=>b[1].cost_usd-a[1].cost_usd);
    mdTbody.innerHTML = models.length
      ? models.map(([name,v]) => {
          const local = isLocal(name);
          const badge = local
            ? '<span class="badge badge-local">local</span>'
            : '<span class="badge badge-cloud">cloud</span>';
          return `<tr>
            <td style="font-weight:500">${name}</td>
            <td>${badge}</td>
            <td>${fmtCost(v.cost_usd)}</td>
            <td style="color:#8b949e">${fmtNum(v.calls)}</td>
          </tr>`;
        }).join('')
      : `<tr><td colspan="4" class="empty">Sem dados</td></tr>`;

    // Traces
    const trTbody = document.querySelector('#tracesTable tbody');
    const trList = traces.traces || [];
    trTbody.innerHTML = trList.length
      ? trList.map(t => {
          const ok = t.success;
          const state = ok
            ? '<span style="color:#3fb950">✓</span>'
            : '<span style="color:#f85149">✗</span>';
          return `<tr>
            <td style="color:#8b949e;font-size:12px">${timeStr(t.started_at)}</td>
            <td style="font-weight:500">${t.agent_name||'—'}</td>
            <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#8b949e">${t.task_description||'—'}</td>
            <td style="font-size:12px">${t.model||'—'}</td>
            <td style="color:#8b949e">${fmtNum(t.tokens_total)}</td>
            <td>${fmtCost(t.cost_usd)}</td>
            <td style="color:#8b949e">${fmtMs(t.duration_ms)}</td>
            <td>${state}</td>
          </tr>`;
        }).join('')
      : `<tr><td colspan="8" class="empty">Sem traces. Correr tarefas para gerar dados.</td></tr>`;

  } catch(e) { console.error('[Costs]', e); }
}

loadCosts();
setInterval(loadCosts, 10000);
</script>
</body>
</html>
